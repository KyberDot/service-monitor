<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KyberBOX · Service Monitor</title>
<link rel="icon" type="image/x-icon" href="https://kyberbox.app/fav.ico">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080c10;
    --surface: #0d1117;
    --border: #1e2733;
    --text: #e6edf3;
    --muted: #7d8590;
    --online: #39d353;
    --offline: #f85149;
    --degraded: #d29922;
    --unknown: #58a6ff;
    --accent: #58a6ff;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    padding: 1.5rem;
    background-image:
      radial-gradient(ellipse 80% 50% at 50% -20%, rgba(88,166,255,0.08) 0%, transparent 60%),
      repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(30,39,51,0.4) 40px),
      repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(30,39,51,0.4) 40px);
  }

  header {
    max-width: 900px;
    margin: 0 auto 3rem;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    padding-bottom: 1rem;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 0.2rem;
    font-size: 1.1rem;
    font-weight: 800;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--accent);
  }

  .logo img {
    height: 42px;
    width: auto;
    display: block;
    flex-shrink: 0;
    margin-right: -1.15rem;
  }

  .logo span { color: var(--muted); font-weight: 400; }

  .last-checked {
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    color: var(--muted);
    text-align: right;
  }

  .refresh-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 0.4rem 0.8rem;
    cursor: pointer;
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    transition: all 0.2s;
    margin-left: 1rem;
  }
  .refresh-btn:hover { border-color: var(--accent); color: var(--accent); }
  .refresh-btn.spinning { animation: spin 1s linear infinite; }
  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

  /* Section headers */
  .section-wrap { max-width: 900px; margin: 0 auto 2rem; }
  .section-label {
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.75rem;
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }
  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(380px, 1fr));
    gap: 1rem;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 0.95rem;
    position: relative;
    overflow: visible;
    transition: border-color 0.3s, transform 0.2s;
    animation: fadeIn 0.4s ease forwards;
    isolation: auto;
    opacity: 0;
  }

  .card:nth-child(1) { animation-delay: 0.05s; }
  .card:nth-child(2) { animation-delay: 0.1s; }
  .card:nth-child(3) { animation-delay: 0.15s; }
  .card:nth-child(4) { animation-delay: 0.2s; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: none; }
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: var(--status-color, var(--border));
    transition: background 0.3s;
  }

  .card:hover { border-color: rgba(88,166,255,0.2); }

  .card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1.2rem;
  }

  .service-info { display: flex; align-items: center; gap: 0.8rem; }

  .service-icon {
    width: 36px; height: 36px;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1rem;
    background: var(--border);
    flex-shrink: 0;
  }

  .service-name { font-size: 1rem; font-weight: 800; letter-spacing: 0.05em; text-transform: uppercase; }
  .service-type { font-family: 'Space Mono', monospace; font-size: 0.65rem; color: var(--muted); margin-top: 0.1rem; }

  .card-header-right { display: flex; flex-direction: column; align-items: flex-end; gap: 0.4rem; }

  .status-badge {
    display: flex; align-items: center; gap: 0.4rem;
    padding: 0.3rem 0.7rem;
    border-radius: 2px;
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem; font-weight: 700;
    letter-spacing: 0.1em; text-transform: uppercase;
    border: 1px solid currentColor;
  }
  .status-badge.online { color: var(--online); }
  .status-badge.offline { color: var(--offline); }
  .status-badge.degraded { color: var(--degraded); }
  .status-badge.unknown { color: var(--unknown); }
  .status-badge.loading { color: var(--muted); }

  .status-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
  .status-dot.online { animation: pulse 2s ease-in-out infinite; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

  /* Expiry badge */
  .expiry-badge {
    font-family: 'Space Mono', monospace;
    font-size: 0.6rem; font-weight: 700;
    letter-spacing: 0.08em; text-transform: uppercase;
    padding: 0.2rem 0.5rem;
    border-radius: 2px;
    border: 1px solid currentColor;
    cursor: pointer;
    transition: opacity 0.2s;
    position: relative;
    white-space: nowrap;
  }
  .expiry-badge.active   { color: var(--online); }
  .expiry-badge.inactive { color: var(--offline); }
  .expiry-badge.lifetime { color: var(--accent); }
  .expiry-badge.unset    { color: var(--muted); border-style: dashed; }
  .expiry-badge:hover { opacity: 0.75; }

  /* Expiry popup */
  .expiry-popup {
    display: none;
    position: absolute;
    right: 0;
    top: calc(100% + 6px);
    background: #111820;
    border: 1px solid var(--border);
    padding: 0.75rem;
    z-index: 9999;
    min-width: 210px;
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    color: var(--text);
  }
  .expiry-popup.open { display: block; }
  .expiry-popup label { color: var(--muted); display: block; margin-bottom: 0.3rem; font-size: 0.6rem; text-transform: uppercase; letter-spacing: 0.1em; }

  .plan-toggle {
    display: flex;
    gap: 0.4rem;
    margin-bottom: 0.6rem;
  }
  .plan-btn {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 0.3rem 0;
    font-family: 'Space Mono', monospace;
    font-size: 0.6rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    cursor: pointer;
    transition: all 0.2s;
  }
  .plan-btn.active-plan { border-color: var(--accent); color: var(--accent); }

  .date-row { display: none; margin-bottom: 0.5rem; }
  .date-row.visible { display: block; }
  .date-row input[type="date"] {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 0.3rem 0.4rem;
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    width: 100%;
  }
  .date-row input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(0.5); }

  .expiry-save-btn {
    background: var(--accent);
    color: #000;
    border: none;
    padding: 0.3rem 0.6rem;
    font-family: 'Space Mono', monospace;
    font-size: 0.6rem; font-weight: 700;
    cursor: pointer;
    width: 100%;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  .expiry-save-btn:hover { opacity: 0.85; }

  .metrics {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
    gap: 1rem;
    padding-top: 1rem;
    border-top: 1px solid var(--border);
  }

  .metric { display: flex; flex-direction: column; gap: 0.2rem; }
  .metric-label { font-family: 'Space Mono', monospace; font-size: 0.6rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; }
  .metric-value { font-family: 'Space Mono', monospace; font-size: 0.85rem; color: var(--text); font-weight: 700; word-break: break-all; }
  .metric-value.latency-good { color: var(--online); }
  .metric-value.latency-ok   { color: var(--degraded); }
  .metric-value.latency-bad  { color: var(--offline); }

  .error-msg {
    font-family: 'Space Mono', monospace; font-size: 0.65rem;
    color: var(--offline); margin-top: 0.8rem; padding: 0.5rem;
    background: rgba(248,81,73,0.05); border: 1px solid rgba(248,81,73,0.15);
    word-break: break-all;
  }

  footer {
    max-width: 900px;
    margin: 3rem auto 0;
    border-top: 1px solid var(--border);
    padding-top: 1rem;
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem; color: var(--muted);
    display: flex; justify-content: space-between;
  }
  .auto-refresh { display: flex; align-items: center; gap: 0.5rem; }
  .countdown { color: var(--accent); font-weight: 700; }
  .service-card-disabled { opacity: 0.4; pointer-events: none; }
</style>
</head>
<body>

<header>
  <div>
    <div class="logo"><img src="https://kyberbox.app/KY.svg" alt="KyberBOX"> · Service Monitor</div>
    <div class="last-checked" id="last-checked">Checking...</div>
  </div>
  <div style="display:flex;align-items:center;gap:0.5rem">
    <button class="refresh-btn" id="refresh-btn" onclick="fetchStatus()">↻ Refresh</button>
  </div>
</header>

<div class="section-wrap">
  <div class="section-label">Infrastructure</div>
  <div class="cards-grid" id="cards-services"></div>
</div>

<div class="section-wrap">
  <div class="section-label">Indexers</div>
  <div class="cards-grid" id="cards-indexers"></div>
</div>

<footer>
  <span>Created by <strong style="color:var(--accent)">KyberBOX</strong> · Checks cached for 60s · TCP + HTTP probes</span>
  <div class="auto-refresh">Auto-refresh in <span class="countdown" id="countdown">60</span>s</div>
</footer>

<script>
const SERVICES = {
  real_debrid: { name: "Real-Debrid", type: "Debrid Service · HTTP API", icon: "⚡" },
  easynews:    { name: "Easynews",    type: "Usenet · HTTP API",          icon: "📰" },
  newshosting: { name: "Newshosting", type: "Usenet · NNTP :563",         icon: "🗞"  },
  tweaknews:   { name: "Tweaknews",   type: "Usenet · NNTP :563",         icon: "📡" },
};

const INDEXERS = {
  althub:       { name: "AltHub",        type: "Usenet Indexer · NZB", icon: "🔍" },
  nzbgeek:      { name: "NZBGeek",       type: "Usenet Indexer · NZB", icon: "🤓" },
  ninjacentrale:{ name: "NinjaCentrale", type: "Usenet Indexer · NZB", icon: "🥷" },
  drunkenslug:  { name: "DrunkenSlug",   type: "Usenet Indexer · NZB", icon: "🐌" },
};

const PLAN_SERVICES = { easynews: true };

function latencyClass(ms) {
  if (ms == null) return "";
  if (ms < 200) return "latency-good";
  if (ms < 600) return "latency-ok";
  return "latency-bad";
}

// ── Storage (server-side JSON) ───────────────────────────────────────────────
let _expiryStore = {};

async function loadExpiryStore() {
  try {
    const res = await fetch("/api/expiry");
    _expiryStore = await res.json();
  } catch(e) { _expiryStore = {}; }
}

function getExpiry(key)      { return _expiryStore[`expiry_${key}`] || ""; }
function getPlan(key)        { return _expiryStore[`plan_${key}`] || "date"; }

function setExpiry(key, val) {
  _expiryStore[`expiry_${key}`] = val;
  fetch("/api/expiry", { method:"POST", headers:{"Content-Type":"application/json"}, body: JSON.stringify({key, expiry: val}) });
}
function setPlan(key, val) {
  _expiryStore[`plan_${key}`] = val;
  fetch("/api/expiry", { method:"POST", headers:{"Content-Type":"application/json"}, body: JSON.stringify({key, plan: val}) });
}

function expiryStatus(key) {
  if (getPlan(key) === "lifetime") return "lifetime";
  const d = getExpiry(key);
  if (!d) return "unset";
  return new Date(d) >= new Date() ? "active" : "inactive";
}

function daysLeft(key) {
  if (getPlan(key) === "lifetime") return null;
  const d = getExpiry(key);
  if (!d) return null;
  return Math.ceil((new Date(d) - new Date()) / (1000 * 60 * 60 * 24));
}

function expiryLabel(key) {
  const plan = getPlan(key);
  if (plan === "lifetime") return "LIFETIME";
  const d = getExpiry(key);
  if (!d) return "STATUS";
  const days = daysLeft(key);
  if (days < 0)  return "INACTIVE";
  if (days === 0) return "EXPIRES TODAY";
  return `${days}d LEFT`;
}

// ── Popup toggle ─────────────────────────────────────────────────────────────
function toggleExpiry(key, event) {
  event.stopPropagation();
  const popup = document.getElementById(`expiry-popup-${key}`);
  document.querySelectorAll(".expiry-popup").forEach(p => { if (p !== popup) p.classList.remove("open"); });
  popup.classList.toggle("open");
  const plan = getPlan(key);
  syncPlanUI(key, plan);
}

function syncPlanUI(key, plan) {
  document.getElementById(`plan-btn-lifetime-${key}`).classList.toggle("active-plan", plan === "lifetime");
  document.getElementById(`plan-btn-date-${key}`).classList.toggle("active-plan", plan === "date");
  const dateRow = document.getElementById(`date-row-${key}`);
  dateRow.classList.toggle("visible", plan === "date");
}

function selectPlan(key, plan) {
  setPlan(key, plan);
  syncPlanUI(key, plan);
}

function saveExpiry(key) {
  const input = document.getElementById(`expiry-input-${key}`);
  setExpiry(key, input.value);
  updateExpiryBadge(key);
  document.getElementById(`expiry-popup-${key}`).classList.remove("open");
}

function updateExpiryBadge(key) {
  const badge = document.getElementById(`expiry-badge-${key}`);
  if (!badge) return;
  const st = expiryStatus(key);
  badge.className = `expiry-badge ${st}`;
  badge.querySelector(".expiry-badge-label").textContent = expiryLabel(key);
}

document.addEventListener("click", () => {
  document.querySelectorAll(".expiry-popup").forEach(p => p.classList.remove("open"));
});

// ── Build expiry widget ───────────────────────────────────────────────────────
function buildExpiryWidget(key) {
  const st = expiryStatus(key);
  return `
    <div style="position:relative;display:inline-block;">
      <div class="expiry-badge ${st}" id="expiry-badge-${key}" onclick="toggleExpiry('${key}', event)">
        <span class="expiry-badge-label">${expiryLabel(key)}</span>
      </div>
      <div class="expiry-popup" id="expiry-popup-${key}" onclick="event.stopPropagation()">
        <label>Plan type</label>
        <div class="plan-toggle">
          <button class="plan-btn" id="plan-btn-date-${key}"     onclick="selectPlan('${key}','date')">Date</button>
          <button class="plan-btn" id="plan-btn-lifetime-${key}" onclick="selectPlan('${key}','lifetime')">Lifetime</button>
        </div>
        <div class="date-row" id="date-row-${key}">
          <label>Expiry date</label>
          <input type="date" id="expiry-input-${key}" value="${getExpiry(key)}">
        </div>
        <button class="expiry-save-btn" onclick="saveExpiry('${key}')">Save</button>
      </div>
    </div>`;
}

// ── Render service card ───────────────────────────────────────────────────────
function renderServiceCard(key, data) {
  const svc = SERVICES[key];
  const status = data ? data.status : "loading";
  const isUnconfigured = data && data.status === "unknown" && data.error && data.error.includes("configured");

  const statusColors = {
    online: "var(--online)", offline: "var(--offline)",
    degraded: "var(--degraded)", unknown: "var(--unknown)", loading: "var(--border)",
  };

  const metrics = [];
  if (data && !isUnconfigured) {
    if (data.latency_ms != null) metrics.push({ label: "Latency", value: `${data.latency_ms}ms`, cls: latencyClass(data.latency_ms) });
    if (data.connections)        metrics.push({ label: "Connections", value: data.connections });
    if (data.allowance_left)     metrics.push({ label: "Allowance Left", value: data.allowance_left });
    if (data.username)           metrics.push({ label: "Account", value: data.username });
    if (PLAN_SERVICES[key])      metrics.push({ label: "Plan", value: "Unlimited" });
    if (data.premium_until)      metrics.push({ label: "Premium Until", value: data.premium_until });
    if (data.host)               metrics.push({ label: "Host", value: data.host });
  }

  const metricsHtml = metrics.length
    ? `<div class="metrics">${metrics.map(m => `
        <div class="metric">
          <div class="metric-label">${m.label}</div>
          <div class="metric-value ${m.cls || ''}">${m.value}</div>
        </div>`).join("")}</div>` : "";

  const errorHtml = data && data.error && !isUnconfigured ? `<div class="error-msg">⚠ ${data.error}</div>` : "";
  const unconfiguredHtml = isUnconfigured
    ? `<div style="font-family:'Space Mono',monospace;font-size:0.65rem;color:var(--muted);margin-top:0.8rem;">No credentials configured — set env vars to enable</div>` : "";

  const cardClass = isUnconfigured ? "card service-card-disabled" : "card";

  return `
    <div class="${cardClass}" id="card-${key}" style="--status-color: ${statusColors[status] || statusColors.loading}">
      <div class="card-header">
        <div class="service-info">
          <div class="service-icon">${svc.icon}</div>
          <div>
            <div class="service-name">${svc.name}</div>
            <div class="service-type">${svc.type}</div>
          </div>
        </div>
        <div class="card-header-right">
          <div class="status-badge ${isUnconfigured ? 'unknown' : status}">
            <div class="status-dot ${isUnconfigured ? '' : status}"></div>
            ${isUnconfigured ? 'n/a' : status}
          </div>
          ${buildExpiryWidget(key)}
        </div>
      </div>
      ${metricsHtml}${errorHtml}${unconfiguredHtml}
    </div>`;
}

// ── Render indexer card (static — no API check) ───────────────────────────────
function renderIndexerCard(key) {
  const svc = INDEXERS[key];
  return `
    <div class="card" id="card-${key}" style="--status-color: var(--accent)">
      <div class="card-header">
        <div class="service-info">
          <div class="service-icon">${svc.icon}</div>
          <div>
            <div class="service-name">${svc.name}</div>
            <div class="service-type">${svc.type}</div>
          </div>
        </div>
        <div class="card-header-right">
          ${buildExpiryWidget(key)}
        </div>
      </div>
    </div>`;
}

function renderSkeleton(services) {
  return Object.keys(services).map(key => {
    const svc = services[key];
    return `
      <div class="card" style="--status-color: var(--border)">
        <div class="card-header">
          <div class="service-info">
            <div class="service-icon">${svc.icon}</div>
            <div>
              <div class="service-name">${svc.name}</div>
              <div class="service-type">${svc.type}</div>
            </div>
          </div>
          <div class="status-badge loading"><div class="status-dot"></div>checking</div>
        </div>
      </div>`;
  }).join("");
}

async function fetchStatus() {
  await loadExpiryStore();
  const btn = document.getElementById("refresh-btn");
  btn.classList.add("spinning");
  document.getElementById("cards-services").innerHTML = renderSkeleton(SERVICES);
  document.getElementById("cards-indexers").innerHTML = Object.keys(INDEXERS).map(k => renderIndexerCard(k)).join("");

  try {
    const res = await fetch("/api/status");
    const data = await res.json();
    document.getElementById("cards-services").innerHTML = Object.keys(SERVICES).map(k => renderServiceCard(k, data[k])).join("");
    // Re-render indexers (they're static but need expiry widgets re-init)
    document.getElementById("cards-indexers").innerHTML = Object.keys(INDEXERS).map(k => renderIndexerCard(k)).join("");

    const ts = data.checked_at ? new Date(data.checked_at * 1000) : new Date();
    document.getElementById("last-checked").textContent = `Last checked: ${ts.toLocaleTimeString()}`;
    resetCountdown();
  } catch (e) {
    document.getElementById("cards-services").innerHTML =
      `<div style="color:var(--offline);font-family:'Space Mono',monospace;font-size:0.8rem;padding:1rem">Failed to fetch status: ${e.message}</div>`;
  } finally {
    btn.classList.remove("spinning");
  }
}

let countdownVal = 60, countdownTimer = null;
function resetCountdown() {
  countdownVal = 60;
  if (countdownTimer) clearInterval(countdownTimer);
  countdownTimer = setInterval(() => {
    countdownVal--;
    const el = document.getElementById("countdown");
    if (el) el.textContent = countdownVal;
    if (countdownVal <= 0) loadExpiryStore().then(fetchStatus);
  }, 1000);
}

loadExpiryStore().then(fetchStatus);
</script>
</body>
</html>
