<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KyberBOX · Service Monitor</title>
<link rel="icon" type="image/x-icon" href="https://kyberbox.app/fav.ico">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080c10;
    --surface: #0d1117;
    --border: #1e2733;
    --text: #e6edf3;
    --muted: #7d8590;
    --online: #39d353;
    --offline: #f85149;
    --degraded: #d29922;
    --unknown: #58a6ff;
    --accent: #58a6ff;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    padding: 1rem;
    background-image:
      radial-gradient(ellipse 80% 50% at 50% -20%, rgba(88,166,255,0.08) 0%, transparent 60%),
      repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(30,39,51,0.4) 40px),
      repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(30,39,51,0.4) 40px);
  }

  header {
    max-width: 900px;
    margin: 0 auto 1.5rem;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    padding-bottom: 1rem;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 0.2rem;
    font-size: 1.1rem;
    font-weight: 800;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--accent);
  }

  .logo img {
    height: 42px;
    width: auto;
    display: block;
    flex-shrink: 0;
    margin-right: -1.15rem;
  }

  .logo span {
    color: var(--muted);
    font-weight: 400;
  }

  .last-checked {
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    color: var(--muted);
    text-align: right;
  }

  .refresh-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 0.4rem 0.8rem;
    cursor: pointer;
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    transition: all 0.2s;
    margin-left: 1rem;
  }

  .refresh-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  .refresh-btn.spinning {
    animation: spin 1s linear infinite;
  }

  @keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  main {
    max-width: 900px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(380px, 1fr));
    gap: 1rem;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 1rem;
    position: relative;
    overflow: hidden;
    transition: border-color 0.3s, transform 0.2s;
    animation: fadeIn 0.4s ease forwards;
    opacity: 0;
  }

  .card:nth-child(1) { animation-delay: 0.05s; }
  .card:nth-child(2) { animation-delay: 0.1s; }
  .card:nth-child(3) { animation-delay: 0.15s; }
  .card:nth-child(4) { animation-delay: 0.2s; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: var(--status-color, var(--border));
    transition: background 0.3s;
  }

  .card:hover {
    border-color: rgba(88,166,255,0.2);
    transform: translateY(-2px);
  }

  .card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 0.8rem;
  }

  .service-info {
    display: flex;
    align-items: center;
    gap: 0.8rem;
  }

  .service-icon {
    width: 36px;
    height: 36px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1rem;
    background: var(--border);
    flex-shrink: 0;
  }

  .service-name {
    font-size: 1rem;
    font-weight: 800;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  .service-type {
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    color: var(--muted);
    margin-top: 0.1rem;
  }

  .status-badge {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    padding: 0.3rem 0.7rem;
    border-radius: 2px;
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    border: 1px solid currentColor;
  }

  .status-badge.online { color: var(--online); }
  .status-badge.offline { color: var(--offline); }
  .status-badge.degraded { color: var(--degraded); }
  .status-badge.unknown { color: var(--unknown); }
  .status-badge.loading { color: var(--muted); }

  .status-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: currentColor;
  }

  .status-dot.online { animation: pulse 2s ease-in-out infinite; }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  .metrics {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
    gap: 1rem;
    padding-top: 1rem;
    border-top: 1px solid var(--border);
  }

  .metric {
    display: flex;
    flex-direction: column;
    gap: 0.2rem;
  }

  .metric-label {
    font-family: 'Space Mono', monospace;
    font-size: 0.6rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }

  .metric-value {
    font-family: 'Space Mono', monospace;
    font-size: 0.85rem;
    color: var(--text);
    font-weight: 700;
  }

  .metric-value.latency-good { color: var(--online); }
  .metric-value.latency-ok { color: var(--degraded); }
  .metric-value.latency-bad { color: var(--offline); }

  .error-msg {
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    color: var(--offline);
    margin-top: 0.8rem;
    padding: 0.5rem;
    background: rgba(248,81,73,0.05);
    border: 1px solid rgba(248,81,73,0.15);
    word-break: break-all;
  }

  .skeleton {
    background: linear-gradient(90deg, var(--border) 25%, rgba(30,39,51,0.8) 50%, var(--border) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.5s infinite;
    border-radius: 2px;
  }

  @keyframes shimmer {
    from { background-position: 200% 0; }
    to { background-position: -200% 0; }
  }

  footer {
    max-width: 900px;
    margin: 3rem auto 0;
    border-top: 1px solid var(--border);
    padding-top: 1rem;
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    color: var(--muted);
    display: flex;
    justify-content: space-between;
  }

  .auto-refresh {
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .service-card-disabled {
    opacity: 0.4;
    pointer-events: none;
  }

  .countdown {
    color: var(--accent);
    font-weight: 700;
  }
</style>
</head>
<body>

<header>
    <div>
      <div class="logo"><img src="https://kyberbox.app/KY.svg" alt="KyberBOX"> · Service Monitor</div>
      <div class="last-checked" id="last-checked">Checking...</div>
    </div>
  <div style="display:flex;align-items:center;gap:0.5rem">
    <button class="refresh-btn" id="refresh-btn" onclick="fetchStatus()">↻ Refresh</button>
  </div>
</header>

<main id="cards">
  <!-- Cards injected by JS -->
</main>

<footer>
  <span>Created by <strong style="color:var(--accent)">KyberBOX</strong> · Checks cached for 60s · TCP + HTTP probes</span>
  <div class="auto-refresh">
    Auto-refresh in <span class="countdown" id="countdown">60</span>s
  </div>
</footer>

<script>
const SERVICES = {
  real_debrid: {
    name: "Real-Debrid",
    type: "Debrid Service · HTTP API",
    icon: "⚡",
  },
  easynews: {
    name: "Easynews",
    type: "Usenet · HTTP API",
    icon: "📰",
  },
  newshosting: {
    name: "Newshosting",
    type: "Usenet · NNTP :563",
    icon: "🗞",
  },
  tweaknews: {
    name: "Tweaknews",
    type: "Usenet · NNTP :563",
    icon: "📡",
  },
};

function latencyClass(ms) {
  if (ms === null || ms === undefined) return "";
  if (ms < 200) return "latency-good";
  if (ms < 600) return "latency-ok";
  return "latency-bad";
}

function renderCard(key, data) {
  const svc = SERVICES[key];
  const status = data ? data.status : "loading";
  const isUnconfigured = data && data.status === "unknown" && data.error && data.error.includes("configured");

  const statusColors = {
    online: "var(--online)",
    offline: "var(--offline)",
    degraded: "var(--degraded)",
    unknown: "var(--unknown)",
    loading: "var(--border)",
  };

  const metrics = [];

  if (data && !isUnconfigured) {
    if (data.latency_ms != null) {
      metrics.push({
        label: "Latency",
        value: `${data.latency_ms}ms`,
        cls: latencyClass(data.latency_ms),
      });
    }
    if (data.connections) {
      metrics.push({ label: "Connections", value: data.connections });
    }
    if (data.allowance_left) {
      metrics.push({ label: "Allowance Left", value: data.allowance_left });
    }
    if (data.username) {
      metrics.push({ label: "Account", value: data.username });
    }
    if (data.premium_until) {
      metrics.push({ label: "Premium Until", value: data.premium_until });
    }
    if (data.host) {
      metrics.push({ label: "Host", value: data.host });
    }
  }

  const metricsHtml = metrics.length
    ? `<div class="metrics">${metrics.map(m => `
        <div class="metric">
          <div class="metric-label">${m.label}</div>
          <div class="metric-value ${m.cls || ''}">${m.value}</div>
        </div>`).join("")}</div>`
    : "";

  const errorHtml = data && data.error && !isUnconfigured
    ? `<div class="error-msg">⚠ ${data.error}</div>`
    : "";

  const unconfiguredHtml = isUnconfigured
    ? `<div style="font-family:'Space Mono',monospace;font-size:0.65rem;color:var(--muted);margin-top:0.8rem;">No credentials configured — set env vars to enable</div>`
    : "";

  const cardClass = isUnconfigured ? "card service-card-disabled" : "card";

  return `
    <div class="${cardClass}" id="card-${key}" style="--status-color: ${statusColors[status] || statusColors.loading}">
      <div class="card-header">
        <div class="service-info">
          <div class="service-icon">${svc.icon}</div>
          <div>
            <div class="service-name">${svc.name}</div>
            <div class="service-type">${svc.type}</div>
          </div>
        </div>
        <div class="status-badge ${isUnconfigured ? 'unknown' : status}">
          <div class="status-dot ${isUnconfigured ? '' : status}"></div>
          ${isUnconfigured ? 'n/a' : status}
        </div>
      </div>
      ${metricsHtml}
      ${errorHtml}
      ${unconfiguredHtml}
    </div>`;
}

function renderSkeleton() {
  return Object.keys(SERVICES).map(key => {
    const svc = SERVICES[key];
    return `
      <div class="card" style="--status-color: var(--border)">
        <div class="card-header">
          <div class="service-info">
            <div class="service-icon">${svc.icon}</div>
            <div>
              <div class="service-name">${svc.name}</div>
              <div class="service-type">${svc.type}</div>
            </div>
          </div>
          <div class="status-badge loading">
            <div class="status-dot"></div>
            checking
          </div>
        </div>
      </div>`;
  }).join("");
}

async function fetchStatus() {
  const btn = document.getElementById("refresh-btn");
  btn.classList.add("spinning");

  document.getElementById("cards").innerHTML = renderSkeleton();

  try {
    const res = await fetch("/api/status");
    const data = await res.json();

    const html = Object.keys(SERVICES).map(key => renderCard(key, data[key])).join("");
    document.getElementById("cards").innerHTML = html;

    const ts = data.checked_at ? new Date(data.checked_at * 1000) : new Date();
    document.getElementById("last-checked").textContent =
      `Last checked: ${ts.toLocaleTimeString()}`;

    resetCountdown();
  } catch (e) {
    document.getElementById("cards").innerHTML =
      `<div style="color:var(--offline);font-family:'Space Mono',monospace;font-size:0.8rem;padding:1rem">Failed to fetch status: ${e.message}</div>`;
  } finally {
    btn.classList.remove("spinning");
  }
}

let countdownVal = 60;
let countdownTimer = null;

function resetCountdown() {
  countdownVal = 60;
  if (countdownTimer) clearInterval(countdownTimer);
  countdownTimer = setInterval(() => {
    countdownVal--;
    const el = document.getElementById("countdown");
    if (el) el.textContent = countdownVal;
    if (countdownVal <= 0) {
      fetchStatus();
    }
  }, 1000);
}

fetchStatus();
</script>
</body>
</html>
